name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        # NEXT_PUBLIC_* are baked at build time; CI uses placeholders so the
        # production build compiles without the real Firebase/API config.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder
          NEXT_PUBLIC_SADIFY_API_BASE_URL: http://localhost:8000
        run: npm run build
